name: CI/CD for KeToan Pro
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install cryptography psutil
    - name: Run tests
      run: |
        pytest tests/ -v
      continue-on-error: true

  push_version:
    needs: test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Push version.json
      run: |
        git config user.email "pnhungc3nvt@gmail.com"
        git config user.name "Phan Ngoc Hung"
        git add configs/version.json version.json
        git diff --staged --quiet || git commit -m "auto: cap nhat phien ban"
        git push